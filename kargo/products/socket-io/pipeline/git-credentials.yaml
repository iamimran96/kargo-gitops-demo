# Git credentials for Kargo to push image updates back to the GitOps repo.
# The label "kargo.akuity.io/cred-type: git" tells Kargo to use this Secret
# for Git operations matching the repoURL.
#
# To activate: uncomment the username/password fields and fill in your
# GitHub username and a Personal Access Token (PAT) with "repo" scope.
# Alternatively, create this secret via kubectl (see README).
apiVersion: v1
kind: Secret
metadata:
  name: git-credentials
  namespace: socket-io
  labels:
    app.kubernetes.io/part-of: kargo-gitops-demo
    app.kubernetes.io/component: socket-io
    app.kubernetes.io/managed-by: kargo
    kargo.akuity.io/cred-type: git
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  repoURL: https://github.com/iamimran96/kargo-gitops-demo.git
  # Replace with a GitHub personal access token (with repo scope)
  #username: <your-github-username>
  #password: <your-github-pat>

# Dev Stage — receives Freight directly from the Warehouse.
# Auto-promoted via ProjectConfig (no manual approval needed).
#
# Promotion steps:
#   1. git-clone   — clone the GitOps repo (main branch)
#   2. yaml-update — patch the dev instance image tag
#   3. git-commit  — commit the change
#   4. git-push    — push to remote (requires git-credentials Secret)
#   5. argocd-update — tell Argo CD to sync the specific commit
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: socket-io
  labels:
    app.kubernetes.io/part-of: kargo-gitops-demo
    app.kubernetes.io/component: socket-io
    app.kubernetes.io/managed-by: kargo
    environment: dev
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: socket-io
      sources:
        direct: true
  promotionTemplate:
    spec:
      vars:
        - name: gitRepo
          value: https://github.com/iamimran96/kargo-gitops-demo.git
        - name: imageRepo
          value: ximran96/node-socket
      steps:
        - uses: git-clone
          config:
            repoURL: ${{ vars.gitRepo }}
            checkout:
              - branch: main
                path: ./src
        - uses: yaml-update
          as: update-image
          config:
            path: ./src/products/dev/socket-io/socket-io-instance.yaml
            updates:
              - key: spec.image
                value: "${{ vars.imageRepo }}:${{ imageFrom(vars.imageRepo).Tag }}"
        - uses: git-commit
          as: commit
          config:
            path: ./src
            message: |
              dev: update socket-io image to ${{ imageFrom(vars.imageRepo).Tag }}
        - uses: git-push
          config:
            path: ./src
        - uses: argocd-update
          config:
            apps:
              - name: socket-io-dev
                namespace: argo-cd
                sources:
                  - repoURL: ${{ vars.gitRepo }}
                    desiredRevision: ${{ outputs.commit.commit }}

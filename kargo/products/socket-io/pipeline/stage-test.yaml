# Test Stage — receives Freight that was verified in dev.
# Requires manual promotion via Kargo UI or CLI.
#
# Promotion steps are identical to dev but target the test instance file.
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: test
  namespace: socket-io
  labels:
    app.kubernetes.io/part-of: kargo-gitops-demo
    app.kubernetes.io/component: socket-io
    app.kubernetes.io/managed-by: kargo
    environment: test
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: socket-io
      sources:
        stages:
          - dev
  promotionTemplate:
    spec:
      vars:
        - name: gitRepo
          value: https://github.com/iamimran96/kargo-gitops-demo.git
        - name: imageRepo
          value: ximran96/node-socket
      steps:
        - uses: git-clone
          config:
            repoURL: ${{ vars.gitRepo }}
            checkout:
              - branch: main
                path: ./src
        - uses: yaml-update
          as: update-image
          config:
            path: ./src/products/test/socket-io/socket-io-instance.yaml
            updates:
              - key: spec.image
                value: "${{ vars.imageRepo }}:${{ imageFrom(vars.imageRepo).Tag }}"
        - uses: git-commit
          as: commit
          config:
            path: ./src
            message: |
              test: update socket-io image to ${{ imageFrom(vars.imageRepo).Tag }}
        - uses: git-push
          config:
            path: ./src
        - uses: argocd-update
          config:
            apps:
              - name: socket-io-test
                namespace: argo-cd
                sources:
                  - repoURL: ${{ vars.gitRepo }}
                    desiredRevision: ${{ outputs.commit.commit }}

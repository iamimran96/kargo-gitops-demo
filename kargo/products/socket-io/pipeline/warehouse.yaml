# Warehouse watches two sources:
#   1. Docker Hub for new semver-tagged images of ximran96/node-socket
#   2. The GitOps repo (main branch) for any new commits
#
# When either source changes, Kargo creates new Freight. This ensures
# the pipeline re-promotes on both image updates AND Git pushes,
# keeping stages healthy even when manual commits land on main.
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: socket-io
  namespace: socket-io
  labels:
    app.kubernetes.io/part-of: kargo-gitops-demo
    app.kubernetes.io/component: socket-io
    app.kubernetes.io/managed-by: kargo
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  subscriptions:
    - image:
        repoURL: ximran96/node-socket
        semverConstraint: "*"
    - git:
        repoURL: https://github.com/iamimran96/kargo-gitops-demo.git
        branch: main

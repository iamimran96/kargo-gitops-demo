# Warehouse watches Docker Hub for new semver-tagged images of
# ximran96/node-socket. When a new tag matching the constraint is
# detected, Kargo creates a new Freight containing the image reference.
# Images must be tagged with valid semver (e.g. 1.0.0, 2.1.3).
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: socket-io
  namespace: socket-io
  labels:
    app.kubernetes.io/part-of: kargo-gitops-demo
    app.kubernetes.io/component: socket-io
    app.kubernetes.io/managed-by: kargo
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  subscriptions:
    - image:
        repoURL: ximran96/node-socket
        semverConstraint: "*"

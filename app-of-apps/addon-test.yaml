apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: addons-test
  namespace: argo-cd
spec:
  project: default
  source:
    repoURL: https://github.com/<your-org>/Kargo-GitOps-Demo.git
    targetRevision: HEAD
    path: addon/test
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-cd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

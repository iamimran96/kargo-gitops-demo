apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kargo
  namespace: argo-cd
spec:
  project: default
  source:
    repoURL: https://github.com/<your-org>/Kargo-GitOps-Demo.git
    targetRevision: HEAD
    path: addon/charts/kargo
  destination:
    server: https://kubernetes.default.svc
    namespace: kargo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
